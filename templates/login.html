<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 16px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 36px;
    }

    .login-icon {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .login-sub {
      text-align: center;
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      transition: border-color 0.2s;
      outline: none;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #4f7ef8;
      box-shadow: 0 0 0 3px rgba(79,126,248,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #4f7ef8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #3a66d8; }

    .erro-msg {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-icon">📋</div>
      <h1 class="login-title">Sistema de Tarefas</h1>
      <p class="login-sub">Entre com sua conta para continuar</p>

      {% if erro %}
        <div class="erro-msg">⚠️ {{ erro }}</div>
      {% endif %}

      <form method="post" action="/login">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required autofocus>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
